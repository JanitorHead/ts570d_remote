;-------------------------------------------------------------------------------
;                        Kenwood TS-570D command set (custom)
;
;  Based on Kenwood.ini and adjusted for TS-570D + modern OmniRig polling:
;  - ReplyEnd=(;) added consistently where applicable
;  - AI2 enabled at init (helps unsolicited/status behavior on Kenwood)
;  - Explicit mode/VFO status blocks kept for better sync
;-------------------------------------------------------------------------------

;Command=<command>
;ReplyLength=<byte_count>
;ReplyEnd=<end_symbol>
;Value<N>=<start_pos>|<length>|<format>|<multiply>|<add>[|<param_name>]
;Flag<N>=<mask>[|<equals>]|<param_name>

;-------------------------------------------------------------------------------
;                                 initialize
;-------------------------------------------------------------------------------
[INIT]
Command=(AI2;)
ReplyLength=0
ReplyEnd=(;)

;-------------------------------------------------------------------------------
;                               set frequency
;-------------------------------------------------------------------------------
[pmFreqA]
Command=(FA...........;)
Value=2|11|vfText|1|0
ReplyLength=0
ReplyEnd=(;)

[pmFreqB]
Command=(FB...........;)
Value=2|11|vfText|1|0
ReplyLength=0
ReplyEnd=(;)

[pmFreq]
;not supported

[pmRitOffset]
;not supported

[pmRit0]
Command=(RC;)
ReplyLength=0
ReplyEnd=(;)

[pmPitch]
Command=(PT..;)
Value=2|2|vfText|0.02|-8
ReplyLength=0
ReplyEnd=(;)

;-------------------------------------------------------------------------------
;                         set rit/xit/split/rx/tx
;-------------------------------------------------------------------------------
[pmSplitOn]
;not supported

[pmSplitOff]
;not supported

[pmVfoA]
;not supported

[pmVfoB]
;not supported

[pmVfoEqual]
;not supported

[pmVfoSwap]
;not supported

[pmVfoAA]
Command=(FR0;)
ReplyLength=0
ReplyEnd=(;)

[pmVfoAB]
Command=(FR0;FT1;)
ReplyLength=0
ReplyEnd=(;)

[pmVfoBA]
Command=(FR1;FT0;)
ReplyLength=0
ReplyEnd=(;)

[pmVfoBB]
Command=(FR1;)
ReplyLength=0
ReplyEnd=(;)

[pmRitOn]
Command=(RT1;)
ReplyLength=0
ReplyEnd=(;)

[pmRitOff]
Command=(RT0;)
ReplyLength=0
ReplyEnd=(;)

[pmXitOn]
Command=(XT1;)
ReplyLength=0
ReplyEnd=(;)

[pmXitOff]
Command=(XT0;)
ReplyLength=0
ReplyEnd=(;)

[pmRx]
Command=(RX;)
ReplyLength=0
ReplyEnd=(;)

[pmTx]
Command=(TX;)
ReplyLength=0
ReplyEnd=(;)

;-------------------------------------------------------------------------------
;                                 set mode
;-------------------------------------------------------------------------------
[pmCW_U]
Command=(MD3;)
ReplyLength=0
ReplyEnd=(;)

[pmCW_L]
Command=(MD7;)
ReplyLength=0
ReplyEnd=(;)

[pmSSB_U]
Command=(MD2;)
ReplyLength=0
ReplyEnd=(;)

[pmSSB_L]
Command=(MD1;)
ReplyLength=0
ReplyEnd=(;)

[pmDIG_U]
Command=(MD9;)
ReplyLength=0
ReplyEnd=(;)

[pmDIG_L]
Command=(MD6;)
ReplyLength=0
ReplyEnd=(;)

[pmAM]
Command=(MD5;)
ReplyLength=0
ReplyEnd=(;)

[pmFM]
Command=(MD4;)
ReplyLength=0
ReplyEnd=(;)

;-------------------------------------------------------------------------------
;                               read status
;-------------------------------------------------------------------------------
[STATUS1]
Command=(IF;)
ReplyEnd=(;)
Validate=(IF...................................;)
Value1=18|5|vfText|1|0|pmRitOffset
Value2=2|11|vfText|1|0|pmFreq
Flag1 =(.......................0..............)|pmRitOff
Flag2 =(.......................1..............)|pmRitOn
Flag3 =(........................0.............)|pmXitOff
Flag4 =(........................1.............)|pmXitOn
Flag5 =(............................0.........)|pmRx
Flag6 =(............................1.........)|pmTx
Flag7 =(.............................1........)|pmSSB_L
Flag8 =(.............................2........)|pmSSB_U
Flag9 =(.............................3........)|pmCW_U
Flag10=(.............................4........)|pmFM
Flag11=(.............................5........)|pmAM
Flag12=(.............................6........)|pmDIG_L
Flag13=(.............................7........)|pmCW_L
Flag14=(.............................9........)|pmDIG_U
Flag15=(..............................0.0.....)|pmVfoAA
Flag16=(..............................1.0.....)|pmVfoBB
Flag17=(............................0.0.1.....)|pmVfoAB
Flag18=(............................0.1.1.....)|pmVfoBA
Flag19=(............................1.0.1.....)|pmVfoBA
Flag20=(............................1.1.1.....)|pmVfoAB
Flag21=(................................1.....)|pmSplitOn
Flag22=(................................0.....)|pmSplitOff

[STATUS2]
Command=(FA;)
ReplyEnd=(;)
Validate=(FA...........;)
Value1=2|11|vfText|1|0|pmFreqA

[STATUS3]
Command=(FB;)
ReplyEnd=(;)
Validate=(FB...........;)
Value1=2|11|vfText|1|0|pmFreqB

[STATUS4]
Command=(MD;)
ReplyEnd=(;)
Validate=(MD.;)
Flag1 =(..1.)|pmSSB_L
Flag2 =(..2.)|pmSSB_U
Flag3 =(..3.)|pmCW_U
Flag4 =(..4.)|pmFM
Flag5 =(..5.)|pmAM
Flag6 =(..6.)|pmDIG_L
Flag7 =(..7.)|pmCW_L
Flag8 =(..9.)|pmDIG_U

[STATUS5]
Command=(FR;)
ReplyEnd=(;)
Validate=(FR.;)
Flag1 =(..0.)|pmVfoAA
Flag2 =(..1.)|pmVfoBB
